<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<!--
  PLAN YOUR WEEKEND — reusable template (Fri–Sun roundup)
  ----------------------------------------------------------------------------
  HOW TO USE
  1. Copy this file to  instagram/plan_your_weekend_<dates>.html
  2. Edit the .week-label and keep the title "Plan Your <span>Weekend</span>".
  3. Add ONE .row per event, sorted by start date/time. The .grid is flexbox
     with flex:1 rows, so it auto-fits however many rows you add.
  4. Swap the BACKGROUND THEME (see the 5 vars marked  <<THEME>>  below) to the
     next unused color in the rotation — see SKILL.md. Ships green by default.
  5. Render to PNG with the Playwright snippet in SKILL.md (screenshot .post).

  TILE LAYOUT: big title on the LEFT, details right-aligned on the RIGHT.
  Keep .tile-name to a single short line (it ellipsizes if too long — shorten
  the wording instead, e.g. "Oregon Ren Faire" not "Oregon Renaissance Faire").
-->
<title>Portland Events – Plan Your Weekend</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;900&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #111;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'DM Sans', sans-serif;
  }
  .post {
    width: 1080px;
    height: 1080px;
    background: #0d2b1a;          /* <<THEME>> canvas background */
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }
  .header {
    padding: 36px 48px 20px;
    position: relative;
    flex-shrink: 0;
  }
  .week-label {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #5cdc80;              /* <<THEME>> accent */
    margin-bottom: 4px;
  }
  .title {
    font-family: 'DM Serif Display', serif;
    font-size: 52px;
    color: #fff;
    line-height: 1.05;
  }
  .title span { color: #5cdc80; }  /* <<THEME>> accent */
  .logo {
    position: absolute;
    top: 36px;
    right: 48px;
    width: 72px;
    height: 72px;
  }
  .divider {
    height: 3px;
    margin: 0 48px;
    background: linear-gradient(90deg, #5cdc80, #3ecfb0, #5ca8ff, transparent);  /* <<THEME>> gradient */
    border-radius: 2px;
    flex-shrink: 0;
  }
  .grid {
    padding: 16px 28px 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    flex: 1;
    min-height: 0;
  }
  /* one event per row: day badge + full-width tile */
  .row {
    display: grid;
    grid-template-columns: 112px 1fr;
    gap: 12px;
    flex: 1;
    min-height: 0;
  }
  .day {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border-radius: 14px;
    background: rgba(255,255,255,0.07);
    text-align: center;
  }
  .day-name {
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.45);
    line-height: 1;
  }
  .day-num {
    font-size: 40px;
    font-weight: 700;
    color: #fff;
    line-height: 1.1;
  }
  /* compact text-only badge for multi-day / all-week events (.day.span) */
  .day.span .day-name { font-size: 19px; color: rgba(255,255,255,0.7); line-height: 1.25; }
  /* tile: title on the left (big), details pushed to the right */
  .tile {
    border-radius: 14px;
    padding: 0 26px;
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 22px;
    overflow: hidden;
  }
  .tile-main {
    flex: 1;
    min-width: 0;
  }
  .tile-type {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    opacity: 0.9;
    line-height: 1;
    margin-bottom: 6px;
  }
  .tile-name {
    font-size: 40px;
    font-weight: 700;
    line-height: 1.05;
    color: #fff;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .tile-meta {
    font-size: 21px;
    font-weight: 500;
    opacity: 0.68;
    color: #fff;
    line-height: 1.3;
    text-align: right;
    flex-shrink: 0;
    max-width: 38%;
  }
  /* tile color classes — rotate for variety, no adjacent repeats. Unchanged by theme. */
  .green  { background: #0a3520; } .green  .tile-type { color: #5cdc80; }
  .teal   { background: #003d35; } .teal   .tile-type { color: #3ecfb0; }
  .blue   { background: #0a2050; } .blue   .tile-type { color: #5ca8ff; }
  .amber  { background: #7a3d00; } .amber  .tile-type { color: #f0a500; }
  .coral  { background: #5c1a10; } .coral  .tile-type { color: #ff7a5c; }
  .purple { background: #2d1a5e; } .purple .tile-type { color: #b39dff; }
  .pink   { background: #4a1040; } .pink   .tile-type { color: #f07ad8; }
  .footer {
    padding: 10px 48px 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
  }
  .footer-cta { font-size: 22px; color: rgba(255,255,255,0.5); line-height: 1.5; }
  .footer-cta strong { color: #5cdc80; display: block; font-size: 26px; }  /* <<THEME>> accent */
  .footer-handle { font-size: 20px; color: rgba(255,255,255,0.35); }
  .footer-tags { font-size: 20px; color: rgba(255,255,255,0.25); text-align: right; line-height: 1.7; }
</style>
</head>
<body>
<div class="post">
  <div class="header">
    <div class="week-label">This weekend in Portland · MON D–D</div>
    <div class="title">Plan Your <span>Weekend</span></div>
    <svg class="logo" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
      <rect x="1" y="5" width="30" height="26" rx="4" fill="#F28C28"/>
      <rect x="1" y="5" width="30" height="9" rx="4" fill="#d4720e"/>
      <rect x="1" y="10" width="30" height="4" fill="#d4720e"/>
      <rect x="9" y="1" width="3.5" height="9" rx="1.75" fill="#a85a0a"/>
      <rect x="19.5" y="1" width="3.5" height="9" rx="1.75" fill="#a85a0a"/>
      <rect x="5" y="18" width="5" height="4.5" rx="1" fill="white" opacity="0.95"/>
      <rect x="13.5" y="18" width="5" height="4.5" rx="1" fill="white" opacity="0.95"/>
      <rect x="22" y="18" width="5" height="4.5" rx="1" fill="white" opacity="0.95"/>
      <rect x="5" y="24.5" width="5" height="4.5" rx="1" fill="white" opacity="0.95"/>
      <rect x="13.5" y="24.5" width="5" height="4.5" rx="1" fill="white" opacity="0.95"/>
      <rect x="22" y="24.5" width="5" height="4.5" rx="1" fill="white" opacity="0.6"/>
    </svg>
  </div>
  <div class="divider"></div>
  <div class="grid">

    <!-- Add one .row per event, sorted by start time. Cycle the tile color class. -->

    <!-- Single-day event row: -->
    <div class="row">
      <div class="day"><span class="day-name">Fri</span><span class="day-num">5</span></div>
      <div class="tile green">
        <div class="tile-main">
          <div class="tile-type">🎭 Category</div>
          <div class="tile-name">Event Name</div>
        </div>
        <div class="tile-meta">Venue<br>Time · Cost</div>
      </div>
    </div>

    <!-- Multi-day / all-weekend event row (text-only badge via .day.span): -->
    <div class="row">
      <div class="day span"><span class="day-name">Sat<br>&amp; Sun</span></div>
      <div class="tile teal">
        <div class="tile-main">
          <div class="tile-type">⚔️ Category</div>
          <div class="tile-name">Event Name</div>
        </div>
        <div class="tile-meta">Venue<br>Time · Cost</div>
      </div>
    </div>

    <div class="row">
      <div class="day"><span class="day-name">Sun</span><span class="day-num">7</span></div>
      <div class="tile blue">
        <div class="tile-main">
          <div class="tile-type">🏀 Category</div>
          <div class="tile-name">Event Name</div>
        </div>
        <div class="tile-meta">Venue<br>Time · Cost</div>
      </div>
    </div>

  </div>
  <div class="divider"></div>
  <div class="footer">
    <div class="footer-cta">
      <strong>+ more events & details</strong>
      <div>pdx-events.com</div>
      <div class="footer-handle">@portland_events_calendar</div>
    </div>
    <div class="footer-tags">#PDXEvents · #Portland · #FreePDX</div>
  </div>
</div>
</body>
</html>
