name: Scheduled rebuild

# Rebuilds the sites so the statically-rendered Portland Events page picks up
# new/changed Google Calendar events. The pages fetch the Calendar API at
# build time, so they only refresh when a deploy runs.
#
# Deploy hooks are PER VERCEL PROJECT, so we trigger one hook per site:
#   VERCEL_HOOK_IANROSADO   -> ianrosado.com project's deploy hook URL
#   VERCEL_HOOK_PDX_EVENTS  -> pdx-events.com project's deploy hook URL
# Each step is skipped (not failed) if its secret is missing, so partial
# setup still works.

on:
  schedule:
    # Four times a day, every 6 hours. Cron in GitHub Actions is always UTC.
    # 1/7/13/19 UTC = roughly 12am / 6am / 12pm / 6pm Pacific (PDT).
    - cron: "0 1,7,13,19 * * *"
  workflow_dispatch: {} # allows a manual run from the Actions tab

jobs:
  trigger-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger ianrosado.com deploy
        env:
          HOOK: ${{ secrets.VERCEL_HOOK_IANROSADO }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "VERCEL_HOOK_IANROSADO not set — skipping ianrosado.com"
          else
            curl -fsS -X POST "$HOOK" && echo "Triggered ianrosado.com rebuild"
          fi

      - name: Trigger pdx-events.com deploy
        env:
          HOOK: ${{ secrets.VERCEL_HOOK_PDX_EVENTS }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "VERCEL_HOOK_PDX_EVENTS not set — skipping pdx-events.com"
          else
            curl -fsS -X POST "$HOOK" && echo "Triggered pdx-events.com rebuild"
          fi
