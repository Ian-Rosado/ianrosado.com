<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Calendar body -->
  <rect x="1" y="5" width="30" height="26" rx="4" fill="#ea580c"/>
  <!-- Header bar -->
  <rect x="1" y="5" width="30" height="9" rx="4" fill="#c2410c"/>
  <rect x="1" y="10" width="30" height="4" fill="#c2410c"/>
  <!-- Binding rings -->
  <rect x="9" y="1" width="3.5" height="9" rx="1.75" fill="#7c2d12"/>
  <rect x="19.5" y="1" width="3.5" height="9" rx="1.75" fill="#7c2d12"/>
  <!-- Day squares row 1 -->
  <rect x="5"  y="18" width="5" height="4.5" rx="1" fill="white" opacity="0.95"/>
  <rect x="13.5" y="18" width="5" height="4.5" rx="1" fill="white" opacity="0.95"/>
  <rect x="22" y="18" width="5" height="4.5" rx="1" fill="white" opacity="0.95"/>
  <!-- Day squares row 2 -->
  <rect x="5"  y="24.5" width="5" height="4.5" rx="1" fill="white" opacity="0.95"/>
  <rect x="13.5" y="24.5" width="5" height="4.5" rx="1" fill="white" opacity="0.95"/>
  <rect x="22" y="24.5" width="5" height="4.5" rx="1" fill="white" opacity="0.6"/>
</svg>
