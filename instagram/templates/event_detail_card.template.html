<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<!--
  EVENT DETAIL CARD — reusable template for carousel slides
  --------------------------------------------------------------------------
  HOW TO USE
  1. Copy this file as the basis for a new week's cards, or add a <div class="post ...">
     block to an existing event_cards_<dates>.html file.
  2. Replace all <<PLACEHOLDERS>> below.
  3. Choose a tile color class on .post: teal | blue | coral | purple | pink | amber
     Match the color used for that event in the Events of the Week grid.
  4. Render with Playwright — screenshot each .post element by index:

       from playwright.sync_api import sync_playwright
       import os
       html = r'C:\...\instagram\event_cards_<dates>.html'
       out  = r'C:\...\instagram\event_cards_<dates>'
       os.makedirs(out, exist_ok=True)
       with sync_playwright() as p:
           browser = p.chromium.launch()
           page = browser.new_page(viewport={'width': 1200, 'height': 1200})
           page.goto('file:///' + html.replace('\\', '/'))
           page.wait_for_load_state('networkidle')
           for i, el in enumerate(page.query_selector_all('.post')):
               el.screenshot(path=os.path.join(out, f'card_{i+1:02d}.png'))
           browser.close()

  LAYOUT: header (week label + logo) → divider → centered body (day badge + content)
  → meta strip (venue / time / cost) → footer (site + handle).

  TILE COLOR CLASSES — sets canvas background and --accent variable:
    teal   #003d35 / #3ecfb0      coral  #5c1a10 / #ff7a5c
    blue   #0a2050 / #5ca8ff      purple #2d1a5e / #b39dff
    amber  #7a3d00 / #f0a500      pink   #4a1040 / #f07ad8
-->
<title>Portland Events – Event Detail Card</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;900&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #111;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    padding: 24px;
    font-family: 'DM Sans', sans-serif;
  }

  /* ── Canvas ── */
  .post {
    width: 1080px;
    height: 1080px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
  }

  /* Tile color classes: background + CSS accent variable */
  .teal   { --accent: #3ecfb0; background: #003d35; }
  .blue   { --accent: #5ca8ff; background: #0a2050; }
  .coral  { --accent: #ff7a5c; background: #5c1a10; }
  .purple { --accent: #b39dff; background: #2d1a5e; }
  .pink   { --accent: #f07ad8; background: #4a1040; }
  .amber  { --accent: #f0a500; background: #7a3d00; }

  /* ── Header ── */
  .card-header {
    padding: 32px 48px 16px;
    position: relative;
    flex-shrink: 0;
  }
  .week-label {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.5);
    margin-bottom: 4px;
  }
  .title {
    font-family: 'DM Serif Display', serif;
    font-size: 46px;
    color: #fff;
    line-height: 1.05;
  }
  .title span { color: var(--accent); }
  .logo {
    position: absolute;
    top: 32px;
    right: 48px;
    width: 68px;
    height: 68px;
  }

  /* ── Divider ── */
  .divider {
    height: 3px;
    margin: 0 48px;
    background: linear-gradient(90deg, var(--accent), transparent);
    border-radius: 2px;
    flex-shrink: 0;
  }

  /* ── Body: vertically centered row ── */
  .card-body {
    flex: 1;
    padding: 0 48px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    min-height: 0;
  }
  .event-row {
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 40px;
  }

  /* Day badge — left column */
  .day-badge {
    flex-shrink: 0;
    width: 150px;
    background: rgba(255,255,255,0.09);
    border-radius: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    align-self: stretch;
    text-align: center;
    padding: 20px 0;
  }
  .day-name {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.45);
    line-height: 1;
    margin-bottom: 4px;
  }
  .day-num {
    font-size: 80px;
    font-weight: 700;
    color: #fff;
    line-height: 1;
  }

  /* Event content — right column */
  .card-content { flex: 1; min-width: 0; }
  .category {
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 14px;
  }
  .event-name {
    font-family: 'DM Serif Display', serif;
    font-size: 56px;
    color: #fff;
    line-height: 1.07;
    margin-bottom: 22px;
  }
  .description {
    font-size: 23px;
    font-weight: 400;
    color: rgba(255,255,255,0.72);
    line-height: 1.55;
  }

  /* ── Meta strip ── */
  .meta-strip {
    padding: 18px 48px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
    border-top: 1px solid rgba(255,255,255,0.1);
  }
  .meta-item {
    font-size: 19px;
    font-weight: 500;
    color: rgba(255,255,255,0.58);
  }
  .meta-sep { font-size: 19px; color: rgba(255,255,255,0.22); }

  /* ── Footer ── */
  .card-footer {
    padding: 12px 48px 28px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
  }
  .footer-site   { font-size: 19px; color: rgba(255,255,255,0.38); }
  .footer-handle { font-size: 19px; color: rgba(255,255,255,0.38); }
</style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════ -->
<!-- EXAMPLE CARD — replace all <<PLACEHOLDER>> values          -->
<!-- ═══════════════════════════════════════════════════════════ -->
<div class="post <<COLOR>>">
  <div class="card-header">
    <div class="week-label">This week in Portland · <<DATE_RANGE>></div>
    <div class="title">Events of the <span>Week</span></div>
    <svg class="logo" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
      <rect x="1" y="5" width="30" height="26" rx="4" fill="#F28C28"/>
      <rect x="1" y="5" width="30" height="9" rx="4" fill="#d4720e"/>
      <rect x="1" y="10" width="30" height="4" fill="#d4720e"/>
      <rect x="9" y="1" width="3.5" height="9" rx="1.75" fill="#a85a0a"/>
      <rect x="19.5" y="1" width="3.5" height="9" rx="1.75" fill="#a85a0a"/>
      <rect x="5" y="18" width="5" height="4.5" rx="1" fill="white" opacity="0.95"/>
      <rect x="13.5" y="18" width="5" height="4.5" rx="1" fill="white" opacity="0.95"/>
      <rect x="22" y="18" width="5" height="4.5" rx="1" fill="white" opacity="0.95"/>
      <rect x="5" y="24.5" width="5" height="4.5" rx="1" fill="white" opacity="0.95"/>
      <rect x="13.5" y="24.5" width="5" height="4.5" rx="1" fill="white" opacity="0.95"/>
      <rect x="22" y="24.5" width="5" height="4.5" rx="1" fill="white" opacity="0.6"/>
    </svg>
  </div>
  <div class="divider"></div>
  <div class="card-body">
    <div class="event-row">
      <div class="day-badge">
        <span class="day-name"><<DAY_NAME>></span>
        <span class="day-num"><<DAY_NUM>></span>
      </div>
      <div class="card-content">
        <div class="category"><<EMOJI>> <<CATEGORY>></div>
        <div class="event-name"><<EVENT_NAME>></div>
        <div class="description"><<DESCRIPTION>></div>
      </div>
    </div>
  </div>
  <div class="meta-strip">
    <span class="meta-item"><<VENUE>></span>
    <span class="meta-sep">·</span>
    <span class="meta-item"><<TIME>></span>
    <!-- Add cost chip if applicable: -->
    <span class="meta-sep">·</span>
    <span class="meta-item"><<COST>></span>
  </div>
  <div class="card-footer">
    <span class="footer-site">pdx-events.com</span>
    <span class="footer-handle">@portland_events_calendar</span>
  </div>
</div>

</body>
</html>
